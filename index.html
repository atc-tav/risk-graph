<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk · Hex Map & Graph</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0c2238; overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif; transition: background .25s; }
    body.light { background: #f1ead7; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 14px; left: 14px; padding: 12px 14px;
      background: rgba(10,22,38,0.78); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #e8eef5; font-size: 13px; max-width: 260px;
      backdrop-filter: blur(4px);
    }
    body.light #hud { background: rgba(252,248,238,0.82); border-color: rgba(0,0,0,0.12); color: #2a2620; }
    #hud h1 { font-size: 15px; margin-bottom: 6px; }
    #hud .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    #hud .sw { width: 13px; height: 13px; border-radius: 3px; }
    #hud .hint { margin-top: 8px; opacity: 0.7; font-size: 11px; line-height: 1.4; }
    #hud label { display: flex; align-items: center; gap: 6px; margin-top: 8px; cursor: pointer; }
    #hud #theme {
      margin-top: 10px; width: 100%; padding: 5px 8px; cursor: pointer; font: inherit; font-size: 12px;
      background: rgba(255,255,255,0.10); color: inherit; border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
    }
    body.light #hud #theme { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.15); }
    #tooltip {
      position: fixed; pointer-events: none; padding: 4px 8px; font-size: 12px;
      background: rgba(0,0,0,0.8); color: #fff; border-radius: 5px; opacity: 0;
      transform: translate(-50%, -140%); white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <h1>Risk · Hex Map</h1>
    <div id="legend"></div>
    <label><input type="checkbox" id="toggle-graph" checked /> Show graph overlay</label>
    <label><input type="checkbox" id="toggle-labels" checked /> Show labels</label>
    <button id="theme" data-mode="dark">◑ Light</button>
    <div class="hint">Drag to orbit · scroll to zoom · hover a territory</div>
  </div>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
