<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk · Hex Map & Graph</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0c2238; overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif; transition: background .25s; }
    body.light { background: #f1ead7; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 14px; left: 14px; padding: 12px 14px;
      background: rgba(10,22,38,0.78); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #e8eef5; font-size: 13px; max-width: 260px;
      backdrop-filter: blur(4px);
    }
    body.light #hud { background: rgba(252,248,238,0.82); border-color: rgba(0,0,0,0.12); color: #2a2620; }
    #hud h1 { font-size: 15px; margin-bottom: 6px; }
    #hud .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    #hud .sw { width: 13px; height: 13px; border-radius: 3px; }
    #hud .hint { margin-top: 8px; opacity: 0.7; font-size: 11px; line-height: 1.4; }
    #hud label { display: flex; align-items: center; gap: 6px; margin-top: 8px; cursor: pointer; }
    #hud #theme {
      margin-top: 10px; width: 100%; padding: 5px 8px; cursor: pointer; font: inherit; font-size: 12px;
      background: rgba(255,255,255,0.10); color: inherit; border: 1px solid rgba(255,255,255,0.18); border-radius: 6px;
    }
    body.light #hud #theme { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.15); }
    #hud hr { border: none; border-top: 1px solid rgba(255,255,255,0.14); margin: 10px 0; }
    body.light #hud hr { border-top-color: rgba(0,0,0,0.12); }
    #hud .seg { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    #hud .seg button {
      flex: 1; padding: 5px 6px; font: inherit; font-size: 11px; cursor: pointer; white-space: nowrap;
      background: rgba(255,255,255,0.08); color: inherit; border: 1px solid rgba(255,255,255,0.16); border-radius: 6px;
    }
    #hud .seg button.on { background: rgba(120,170,230,0.38); border-color: rgba(150,190,240,0.65); }
    body.light #hud .seg button { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.15); }
    body.light #hud .seg button.on { background: rgba(70,120,190,0.22); border-color: rgba(70,120,190,0.5); }
    #narr { margin-top: 8px; line-height: 1.45; opacity: 0.95; }
    #dlegend { margin-top: 8px; }
    #dlegend .dl-cells { display: flex; gap: 2px; }
    #dlegend .dl-cell { flex: 1; height: 16px; min-width: 0; border-radius: 2px;
      font-size: 9px; line-height: 16px; text-align: center; color: rgba(0,0,0,0.7); font-weight: 600; }
    #dlegend .dl-cap { font-size: 10px; opacity: 0.7; margin-top: 3px; }
    #dlegend .dl-keys { display: flex; gap: 12px; font-size: 10px; opacity: 0.85; margin-top: 4px; }
    #dlegend .dl-keys span { display: flex; align-items: center; gap: 4px; }
    #dlegend .dl-sw { width: 18px; height: 4px; border-radius: 2px; display: inline-block; }
    #dlegend .dl-sw.none { width: 11px; height: 11px; border-radius: 3px; }
    #tooltip {
      position: fixed; pointer-events: none; padding: 4px 8px; font-size: 12px;
      background: rgba(0,0,0,0.8); color: #fff; border-radius: 5px; opacity: 0;
      transform: translate(-50%, -140%); white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <h1>Risk · Hex Map</h1>
    <div id="legend"></div>
    <label><input type="checkbox" id="toggle-graph" checked /> Show graph overlay</label>
    <label><input type="checkbox" id="toggle-labels" checked /> Show labels</label>
    <button id="theme" data-mode="dark">◑ Light</button>
    <div class="hint">Drag to orbit · scroll to zoom · hover a territory</div>
  </div>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
